name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Create .env for CI
        run: cp .env.example .env
      - name: Audit dependencies
        run: pnpm audit --audit-level=high || true
      - name: Verify
        run: pnpm verify

  template-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify placeholder integrity
        run: |
          ALLOWED="APP_NAME APP_SLUG ANDROID_PACKAGE IOS_BUNDLE_IDENTIFIER APP_SCHEME DESCRIPTION EAS_PROJECT_ID PLACEHOLDER"
          FOUND=$(grep -roh '{{[A-Z_]*}}' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs' \
            --include='*.json' --include='*.md' --include='*.yml' --include='*.yaml' \
            --include='*.sh' --include='*.env*' \
            --exclude-dir=node_modules --exclude-dir=.git \
            2>/dev/null | sed 's/{{//;s/}}//' | sort -u || true)

          EXIT=0
          for placeholder in $FOUND; do
            if ! echo "$ALLOWED" | grep -qw "$placeholder"; then
              echo "ERROR: Unknown placeholder {{$placeholder}}"
              EXIT=1
            fi
          done

          if [ "$EXIT" -ne 0 ]; then
            exit 1
          fi
          echo "All placeholders are from the allowed set: $FOUND"
